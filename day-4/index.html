
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        h1{
            text-align:center;
            margin-top:20px;
            margin-bottom:10px;
        }

        #container{
            width:50%;
            margin:auto;
            margin-top:20px;

            border:2px solid blue;
            border-radius:5px;

            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            align-items:center;

            padding:10px;

            box-shadow:
                10px -10px 0 orange,
                20px -20px 0 gold,
                30px -30px 0 green,
                40px -40px 0 tomato;
        }

        .child{
            width:150px;
            height:150px;
            margin:10px;

            display:flex;
            justify-content:center;
            align-items:center;

            border-radius:10px;
            background-color:yellowgreen;

            box-shadow:
                rgba(240,46,170,0.4) -5px 5px,
                rgba(240,46,170,0.3) -10px 10px,
                rgba(240,46,170,0.2) -15px 15px,
                rgba(240,46,170,0.1) -20px 20px,
                rgba(240,46,170,0.05) -25px 25px;
        }
    </style>
</head>

<body>

<h1>Flex Box</h1>

<div id="container">

    <div class="child">Box</div>
    <div class="child">Box</div>
    <div class="child">Box</div>
    <div class="child">Box</div>

    <div class="child">Box</div>
    <div class="child">Box</div>
    <div class="child">Box</div>
    <div class="child">Box</div>

    <div class="child">Box</div>
    <div class="child">Box</div>

</div>

</body>
</html>
